<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Tutorial Help</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}
.back-arrow {
  position:absolute; left:20px; top:20px;
  font-size:2rem; color:#00fff7; text-decoration:none; z-index:30;
  transition:transform .18s ease,color .18s ease;
}
.back-arrow:hover{ transform:translateX(-6px); color:#fff }

canvas#bgCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background: linear-gradient(120deg,#001f3f,#000,#002f4b);
background-size:300% 300%;
animation:bgShift 20s ease infinite;
}

@keyframes bgShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.help-box {
  width: 90%;
  max-width: 60vh;
  background: rgba(0, 0, 0, 0.65);
  border: 6px solid cyan;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  position: relative;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px cyan;
  
}

.help-title{
font-size:40px;
font-weight:bold;
margin-bottom:10px;
text-shadow:0 0 15px cyan;
}

.slide{
display:none;
}

.slide.active{
display:block;
}

.slide img {
  width: 100%;
  max-width: 600px;
  margin: 10px auto;
  border-radius: 10px;
  box-shadow: 0 0 15px cyan;
  display: block;
  object-fit: contain;
  max-height: 60vh;
}

@media (max-width: 1268px) {
 .help-box {
    max-width: 70%;
    padding: 15px;
    border-width: 4px;
  }

  .help-title {
    font-size: 24px;
  }

  .slide img {
    max-width: 100%;
    max-height: 50vh;
    min-height: 200px;
  }

  .slide p {
    font-size: 18px;
    margin-top: 12px;
  }

  .nav-btn {
    width: 40px;
    height: 40px;
    font-size: 22px;
  }

  .prev {
    left: 10px;
  }

  .next {
    right: 10px;
  }
}

.slide p{
font-size:18px;
margin-top:10px;
text-shadow:0 0 8px cyan;
}

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
background:#00ffff;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
color:black;
box-shadow:0 0 15px cyan;
}

.prev{
left:-70px;
}

.next{
right:-70px;
}

.dots{
margin-top:15px;
}

.dot{
height:15px;
width:15px;
margin:5px;
background:#666;
display:inline-block;
border-radius:50%;
}

.dot.active{
background:#00ffff;
box-shadow:0 0 10px cyan;
}

   .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .modal.show {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: #0f1724;
      color: #fff;
      padding: 24px 28px;
      border-radius: 10px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 10px #0ea5b3;
    }

    .modal-content h2 {
      margin-bottom: 12px;
    }

</style>
</head>

<body>
<a class="back-arrow" href="challenge.html">←</a>

<div class="modal" id="rotateModal">
  <div class="modal-content">
    <h2>📱 Rotate Device</h2>
    <p>Please use <b>portrait mode.</b></p>
  </div>
</div>

<canvas id="bgCanvas"></canvas>

<div class="help-box">

<div class="help-title">CHALLENGE MODE</div>

  <div class="slide active">
      <img src="IMG_20260313_222215_995.jpg">
      <p>Match Battle 1!</p>
    </div>

    <div class="slide">
      <img src="IMG_20260313_222212_349.jpg">
      <p>Match Battle 2!</p>
    </div>

    <div class="slide">
      <img src="IMG_20260313_222212_080.jpg">
      <p>Code Collector!</p>
    </div>

<button class="nav-btn prev" onclick="changeSlide(-1)">❮</button>
<button class="nav-btn next" onclick="changeSlide(1)">❯</button>

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

<script>
if (localStorage.getItem('loggedIn') == null) {
  window.location.href = 'login.html';
}
let slideIndex = 0;

const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(index){

slides.forEach(slide => slide.classList.remove("active"));
dots.forEach(dot => dot.classList.remove("active"));

slides[index].classList.add("active");
dots[index].classList.add("active");

}

function changeSlide(n){

slideIndex += n;

if(slideIndex >= slides.length){
slideIndex = 0;
}

if(slideIndex < 0){
slideIndex = slides.length - 1;
}

showSlide(slideIndex);

}


const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

let particles = [];

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

window.addEventListener("resize",resizeCanvas);
resizeCanvas();

class Particle{

constructor(){
this.x = Math.random()*canvas.width;
this.y = Math.random()*canvas.height;
this.size = Math.random()*3+1;
this.speedX = (Math.random()-0.5)*0.5;
this.speedY = (Math.random()-0.5)*0.5;
this.color = `hsl(${Math.random()*60+180},100%,50%)`;
}

update(){
this.x += this.speedX;
this.y += this.speedY;

if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
}

draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.shadowColor = this.color;
ctx.shadowBlur = 20;
ctx.fillStyle = this.color;
ctx.fill();
}

}

function initParticles(){

particles = [];

for(let i=0;i<80;i++){
particles.push(new Particle());
}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.update();
p.draw();
});

requestAnimationFrame(animate);

}

initParticles();
animate();
const rotateModal = document.getElementById("rotateModal")
let paused = false;

function checkScreen() {
  if (window.innerWidth > window.innerHeight) {
    rotateModal.classList.add("show");
    paused = true;
  } else {
    rotateModal.classList.remove("show");
    paused = false;
  }
}

checkScreen();
window.addEventListener("resize", checkScreen);

</script>

</body>
</html>
